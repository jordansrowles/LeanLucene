name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: |
      github.event_name == 'pull_request' ||
      startsWith(github.event.head_commit.message, '[build]') ||
      startsWith(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore tests
        run: dotnet restore src/Rowles.LeanLucene.Tests/Rowles.LeanLucene.Tests.csproj

      - name: Build tests
        run: dotnet build src/Rowles.LeanLucene.Tests/Rowles.LeanLucene.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test src/Rowles.LeanLucene.Tests/Rowles.LeanLucene.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Build docs
        shell: pwsh
        run: ./scripts/docs.ps1 -SkipBenchmarks

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: src/Rowles.LeanLucene.Tests/TestResults/*.trx
          if-no-files-found: ignore

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: leanlucene-docs-site
          path: docs/site
